<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1033"/>
      <stop offset="100%" stop-color="#0f1117"/>
    </linearGradient>
    <linearGradient id="flame" x1="0.5" y1="1" x2="0.5" y2="0">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="40%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <linearGradient id="glow" x1="0.5" y1="1" x2="0.5" y2="0">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Glow effect -->
  <ellipse cx="256" cy="380" rx="100" ry="60" fill="url(#glow)" filter="url(#blur)"/>
  <!-- Main flame -->
  <path d="M256 100 C220 180, 160 220, 160 300 C160 360, 200 410, 256 410 C312 410, 352 360, 352 300 C352 220, 292 180, 256 100Z" fill="url(#flame)" opacity="0.95"/>
  <!-- Inner flame -->
  <path d="M256 180 C240 230, 210 260, 210 310 C210 345, 228 375, 256 375 C284 375, 302 345, 302 310 C302 260, 272 230, 256 180Z" fill="#fbbf24" opacity="0.7"/>
  <!-- Core -->
  <path d="M256 250 C248 275, 235 290, 235 315 C235 332, 244 345, 256 345 C268 345, 277 332, 277 315 C277 290, 264 275, 256 250Z" fill="#fff" opacity="0.5"/>
  <!-- Coin symbol -->
  <circle cx="256" cy="310" r="28" fill="none" stroke="#fff" stroke-width="4" opacity="0.35"/>
  <text x="256" y="320" font-family="Arial,sans-serif" font-size="32" font-weight="700" fill="#fff" opacity="0.35" text-anchor="middle">¥</text>
</svg>
